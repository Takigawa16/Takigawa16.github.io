<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Tulip Field - I Miss You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #98D8C8 50%, #7CB342 100%);
            overflow: hidden;
            font-family: 'Georgia', serif;
            position: relative;
            cursor: pointer;
        }

        /* Music Control */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .music-btn {
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            color: white;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,105,180,0.4);
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(255,105,180,0.6);
        }

        .tulips-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65%;
            padding: 0 5%;
        }

        .tulip {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 35px;
            height: 160px;
            cursor: pointer;
            animation: sway 4s ease-in-out infinite;
            transition: transform 0.2s ease;
        }

        .tulip:hover {
            transform: scale(1.15);
        }

        /* SIMPLIFIED PERFECT ALIGNMENT */
        .tulip-stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            background: linear-gradient(to top, #2d5016, #4a7c59);
            border-radius: 2px 2px 0 0;
            height: 98px; /* Uniform stem height for perfect alignment */
        }

        /* 🌟 PERFECTLY ALIGNED FLOWERS - ONE POSITION FITS ALL */
        .tulip-flower {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 62px; /* EXACTLY above 110px stem - perfect every time */
            width: 35px;
            height: 45px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 
                0 2px 5px rgba(0,0,0,0.3),
                inset 0 2px 3px rgba(255,255,255,0.4);
            z-index: 2;
        }

        /* Tulip Colors */
        .tulip.pink .tulip-flower { 
            background: radial-gradient(ellipse at center, #ff69b4 0%, #ff1493 40%, #c71585 100%); 
        }
        .tulip.red .tulip-flower { 
            background: radial-gradient(ellipse at center, #ff4500 0%, #dc143c 40%, #b22222 100%); 
        }
        .tulip.yellow .tulip-flower { 
            background: radial-gradient(ellipse at center, #ffd700 0%, #ffaa00 40%, #ff8c00 100%); 
        }
        .tulip.purple .tulip-flower { 
            background: radial-gradient(ellipse at center, #da70d6 0%, #ba55d3 40%, #9370db 100%); 
        }
        .tulip.white .tulip-flower { 
            background: radial-gradient(ellipse at center, #fff8dc 0%, #f5f5dc 40%, #fffaf0 100%);
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Petals */
        .tulip-flower::before,
        .tulip-flower::after {
            content: '';
            position: absolute;
            top: 5px;
            width: 20px;
            height: 25px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        }

        .tulip-flower::before { left: -8px; transform: rotate(-20deg); }
        .tulip-flower::after { right: -8px; transform: rotate(20deg); }

        /* Petal colors */
        .pink .tulip-flower::before { background: radial-gradient(ellipse at center, #ffb6c1 0%, #ff69b4 100%); }
        .pink .tulip-flower::after { background: radial-gradient(ellipse at center, #ff1493 0%, #c71585 100%); }
        .red .tulip-flower::before { background: radial-gradient(ellipse at center, #ff6347 0%, #ff4500 100%); }
        .red .tulip-flower::after { background: radial-gradient(ellipse at center, #dc143c 0%, #b22222 100%); }
        .yellow .tulip-flower::before { background: radial-gradient(ellipse at center, #ffeb3b 0%, #ffd700 100%); }
        .yellow .tulip-flower::after { background: radial-gradient(ellipse at center, #ffaa00 0%, #ff8c00 100%); }
        .purple .tulip-flower::before { background: radial-gradient(ellipse at center, #ee82ee 0%, #da70d6 100%); }
        .purple .tulip-flower::after { background: radial-gradient(ellipse at center, #ba55d3 0%, #9370db 100%); }
        .white .tulip-flower::before { background: radial-gradient(ellipse at center, #fff5ee 0%, #fff8dc 100%); }
        .white .tulip-flower::after { background: radial-gradient(ellipse at center, #f0f8ff 0%, #f5f5dc 100%); }

        /* Tulip positioning */
        .tulip:nth-child(1) { left: 5%; animation-delay: 0s; }
        .tulip:nth-child(2) { left: 12%; animation-delay: 0.2s; }
        .tulip:nth-child(3) { left: 20%; animation-delay: 0.4s; }
        .tulip:nth-child(4) { left: 28%; animation-delay: 0.6s; }
        .tulip:nth-child(5) { left: 35%; animation-delay: 0.8s; }
        .tulip:nth-child(6) { left: 42%; animation-delay: 1s; }
        .tulip:nth-child(7) { left: 50%; animation-delay: 1.2s; }
        .tulip:nth-child(8) { left: 58%; animation-delay: 1.4s; }
        .tulip:nth-child(9) { left: 65%; animation-delay: 1.6s; }
        .tulip:nth-child(10) { left: 72%; animation-delay: 1.8s; }
        .tulip:nth-child(11) { left: 80%; animation-delay: 2s; }
        .tulip:nth-child(12) { left: 88%; animation-delay: 2.2s; }
        .tulip:nth-child(13) { left: 92%; animation-delay: 0.1s; }
        .tulip:nth-child(14) { left: 3%; animation-delay: 2.4s; }
        .tulip:nth-child(15) { left: 15%; animation-delay: 2.6s; }
        .tulip:nth-child(16) { left: 25%; animation-delay: 2.8s; }
        .tulip:nth-child(17) { left: 45%; animation-delay: 0.3s; }
        .tulip:nth-child(18) { left: 55%; animation-delay: 0.5s; }
        .tulip:nth-child(19) { left: 70%; animation-delay: 0.7s; }
        .tulip:nth-child(20) { left: 85%; animation-delay: 0.9s; }

        .floating-message {
            position: absolute;
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: floatAway 3s ease-out forwards;
            z-index: 20;
        }

        @keyframes floatAway {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.2); }
        }

        .message {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .message h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            animation: fadeInUp 2s ease-out;
        }

        .message p {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(255,255,255,0.9);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            animation: fadeInUp 2s ease-out 0.3s both;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(30px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Music Control Button -->
    <div class="music-control">
        <button class="music-btn" id="musicToggle">🎵</button>
    </div>

    <div class="message">
        <h1>I miss you</h1>
        <p>🌸 From The Start by Laufey • Click any tulip 🌸</p>
    </div>
    
    <div class="tulips-container">
        <div class="tulip pink"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip red"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip yellow"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip purple"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip white"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip pink"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip red"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip yellow"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip purple"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip white"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip pink"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip red"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip yellow"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip purple"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip white"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip pink"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip red"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip yellow"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip purple"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
        <div class="tulip white"><div class="tulip-stem"></div><div class="tulip-flower"></div></div>
    </div>

    <script>
        const tulips = document.querySelectorAll('.tulip');
        
        // 🎵 MP3 BACKGROUND MUSIC
        const bgMusic = document.createElement('audio');
        bgMusic.id = 'backgroundMusic';
        bgMusic.src = 'from-the-start.mp3';
        bgMusic.loop = true;
        bgMusic.preload = 'auto';
        bgMusic.volume = 0.3;
        document.body.appendChild(bgMusic);
        
        let musicPlaying = false;
        
        // Music toggle button
        document.getElementById('musicToggle').addEventListener('click', () => {
            const music = document.getElementById('backgroundMusic');
            if (musicPlaying) {
                music.pause();
                document.getElementById('musicToggle').textContent = '🎵';
                musicPlaying = false;
            } else {
                music.play();
                document.getElementById('musicToggle').textContent = '⏸️';
                musicPlaying = true;
            }
        });
        
        // Tulip clicks
        tulips.forEach((tulip, index) => {
            tulip.addEventListener('click', function(e) {
                const message = document.createElement('div');
                message.className = 'floating-message';
                message.textContent = 'I miss you 💕';
                message.style.left = (e.clientX - 40) + 'px';
                message.style.top = (e.clientY - 20) + 'px';
                message.style.fontSize = (16 + Math.random() * 8) + 'px';
                
                document.body.appendChild(message);
                
                setTimeout(() => {
                    if (message.parentNode) {
                        message.parentNode.removeChild(message);
                    }
                }, 3000);
                
                this.style.animation = 'none';
                this.style.transform = 'scale(1.3)';
                setTimeout(() => {
                    this.style.animation = '';
                    this.style.transform = '';
                }, 200);
            });
        });
        
        // Auto-start music on first click (browser policy)
        document.addEventListener('click', function startMusic() {
            const music = document.getElementById('backgroundMusic');
            music.play().then(() => {
                musicPlaying = true;
                document.getElementById('musicToggle').textContent = '⏸️';
            }).catch(e => console.log('Click music button to start'));
            document.removeEventListener('click', startMusic);
        }, { once: true });
    </script>
</body>
</html>
